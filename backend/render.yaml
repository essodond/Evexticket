databases:
  - name: evexticket-db
    databaseName: evexticket
    user: evexticket
    plan: free
    region: frankfurt

services:
  - type: web
    name: evexticket-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: "cd backend && bash build.sh"
    startCommand: "cd backend && bash start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: evexticket-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOW_ALL
        value: "True"
      - key: PYTHON_VERSION
        value: "3.12.3"



